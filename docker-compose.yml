services:
  postgres-airflow:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    ports:
      - "${AIRFLOW_POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  linkedin-notifier:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres-airflow:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: dags/.env
        required: false
    environment:
      AIRFLOW_HOME: /usr/local/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS:-admin:admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
      AIRFLOW__API__BASE_URL: ${AIRFLOW__API__BASE_URL:-http://127.0.0.1:8080}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW__CORE__EXECUTION_API_SERVER_URL:-http://127.0.0.1:8080/execution/}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres-airflow:5432/${AIRFLOW_DB_NAME:-airflow}}
      JOBS_DB_URL: ${JOBS_DB_URL}
      PROFILE_CONFIG_PATH: ${PROFILE_CONFIG_PATH:-/usr/local/airflow/include/user_info/profiles.json}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      CLOUD_DEPLOYMENT: ${CLOUD_DEPLOYMENT:-0}
      LINKEDIN_TEST_MODE: ${LINKEDIN_TEST_MODE:-false}
      LINKEDIN_TEST_MAX_JOBS: ${LINKEDIN_TEST_MAX_JOBS:-10}
      LINKEDIN_TEST_MAX_SCAN_ROWS: ${LINKEDIN_TEST_MAX_SCAN_ROWS:-10}
      LINKEDIN_TEST_MAX_JD_JOBS: ${LINKEDIN_TEST_MAX_JD_JOBS:-10}
      LINKEDIN_TEST_MAX_FIT_JOBS: ${LINKEDIN_TEST_MAX_FIT_JOBS:-10}
      SCAN_REQUEST_PAGE_SIZE: ${SCAN_REQUEST_PAGE_SIZE:-10}
      SCAN_BETWEEN_REQUESTS_MIN_SEC: ${SCAN_BETWEEN_REQUESTS_MIN_SEC:-0.8}
      SCAN_BETWEEN_REQUESTS_MAX_SEC: ${SCAN_BETWEEN_REQUESTS_MAX_SEC:-1.8}
      SCAN_BETWEEN_TERMS_DELAY_SEC: ${SCAN_BETWEEN_TERMS_DELAY_SEC:-8.0}
      SCAN_HTTP_MAX_RETRIES: ${SCAN_HTTP_MAX_RETRIES:-6}
      SCAN_HTTP_BASE_DELAY_SEC: ${SCAN_HTTP_BASE_DELAY_SEC:-2.0}
      SCAN_HTTP_MAX_DELAY_SEC: ${SCAN_HTTP_MAX_DELAY_SEC:-60.0}
      SCAN_HTTP_JITTER_SEC: ${SCAN_HTTP_JITTER_SEC:-1.5}
      SCAN_REQUEST_TIMEOUT_SEC: ${SCAN_REQUEST_TIMEOUT_SEC:-45}
      JD_WORKER_BATCH_SIZE: ${JD_WORKER_BATCH_SIZE:-3}
      FITTING_CONCURRENCY: ${FITTING_CONCURRENCY:-8}
    ports:
      - "8080:8080"

volumes:
  airflow-postgres-data:
