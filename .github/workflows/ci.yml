name: CI

on:
  push:
    branches: [main, zeabur-airflow-deploy]
  pull_request:
    branches: [main, zeabur-airflow-deploy]

jobs:
  airflow-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (dags/)
        run: |
          python -m py_compile dags/*.py

      - name: DAG import validation (Astro)
        run: |
          pip install astro-sdk-python apache-airflow
          python .astro/test_dag_integrity_default.py

      - name: Pytest (core suite)
        run: |
          pytest -q \
            tests/test_process_test_mode_profile.py \
            tests/test_fitting_notifier.py \
            tests/test_fitting_notifier_policy.py \
            tests/test_database_queue_semantics.py \
            tests/test_migration_compat.py \
            tests/test_profile_fit_prompt_configs.py \
            tests/test_notifier_matcher_contract.py \
            tests/test_runtime_conf_helpers.py

      - name: Shell syntax check (smoke scripts)
        run: |
          bash -n scripts/run_airflow_test_mode_smoke.sh
