<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ profile_name }} - Cover Letter</title>
    <style>
      @page { size: A4; margin: 18mm 18mm; }
      :root {
        --text: #172033;
        --muted: #5b6475;
        --line: #d7dce5;
        --accent: #1f4aa8;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        font-size: 11pt;
        line-height: 1.55;
        background: white;
      }
      .letter-page {
        max-width: 760px;
        margin: 0 auto;
      }
      .letter-header {
        padding-bottom: 12px;
        border-bottom: 1.5px solid var(--accent);
        margin-bottom: 18px;
      }
      .name {
        font-size: 23pt;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .subject {
        margin-top: 12px;
        font-size: 10.6pt;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        font-weight: 700;
      }
      .letter-body .greeting,
      .letter-body .closing {
        margin: 0 0 12px 0;
      }
      .letter-body .paragraph {
        margin: 0 0 12px 0;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="letter-page">
      <header class="letter-header">
        <div class="name">{{ profile_name }}</div>
        {% if subject %}
          <div class="subject">{{ subject }}</div>
        {% endif %}
      </header>

      <main class="letter-body">
        <p class="greeting">{{ greeting }}</p>

        {% for paragraph in paragraphs %}
          <p class="paragraph">{{ paragraph }}</p>
        {% endfor %}

        <p class="closing">{% for line in closing.split('\n') %}{{ line }}{% if not loop.last %}<br />{% endif %}{% endfor %}</p>
      </main>
    </div>
  </body>
</html>
